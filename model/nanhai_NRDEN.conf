[data]
num_nodes = 265
lag = 30
horizon = 15
val_ratio = 0.2
test_ratio = 0.2
tod = True
normalizer = std
column_wise = True
default_graph = True

[model]
type = type1
g_type = agc
input_dim = 2
output_dim = 1
embed_dim = 16
hid_dim = 128
hid_hid_dim = 128
num_layers = 2
cheb_order = 2
signature_depth = 3
logsig_spline_substeps = 4
logsig_concat_raw = True
use_dynamic_graph = True
graph_method = attention
graph_alpha = 0.4
n_heads = 4
attention_dropout = 0.15
temperature = 0.2
use_residual = True
use_layer_norm = True
use_adaptive_sparse = False
sparsify_method = simple
min_topk = 5
max_topk = 30
graph_topk = 12
graph_dropout = 0.12

[train]
loss_func = mae
seed = 42
batch_size = 24
epochs = 200
lr_init = 0.0008
weight_decay = 0.0012
lr_decay = True
lr_decay_rate = 0.65
lr_decay_step = 50,100,150
early_stop = True
early_stop_patience = 35
grad_norm = True
max_grad_norm = 3
real_value = False
warmup_epochs = 12

[test]
mae_thresh = None
mape_thresh = 0.

[log]
log_step = 20
plot = True
